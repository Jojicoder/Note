<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Study Planner</title>
        <link rel="stylesheet" href="css/style.css">
    </head>
    <body>
        <div class="pape-container">
            <header class="site-header">
                <h1 class="logo">Study Planner</h1>
                <nav class="main-nav">
                    <ul>
                        <li>Tasks</li>
                        <li>Notes</li>
                        <li>Settings</li>
                    </ul>
                </nav>
            </header>

            <main class="main-content">
                <section class="input-section"><h2>Today's Goal</h2>
                <input type="text" placeholder="Enter your study goal">
                <button>Add Goal</button>
                </section>

                <section class="task-section">
                    <h2>Task List</h2>
                    <ul>
                        <li>Review HTML tags</li>
                        <li>Practice CSS layout</li>
                        <li>Write simple JavaScript</li>
                    </ul>
                </section>
                
            </main>
        </div>
    </body>
</html>
