<!DOCTYPE html>
<html>
    <head></head>
    <body>
        <script>
            let fruits = ["Apple", "Banana", "Mango", "Orange"];
            
            let index = fruits.indexOf("Banana");
            if(index !== -1){
                fruits.splice(index, 1);
            }
            document.write("after splice: " + fruits + "<br>");

            let nums = [1,2,3,2,4,2];
            for(let i  = nums.length - 1;i>=0;i--){
                if(nums[i] === 2){
                    nums.splice(i, 1);
                }
            }
            document.write("after remove all 2s: "+ nums+ "<br>");

            let vegs = ["Carrot","Potato", "Onion","Tomato"];
            let slice = vegs.slice(1,3);
            document.write("slice(1,3): "+ slice +"<br>");
            document.write("original: " + vegs +"<br>");

            let a = ["Apple","Banana"];
            let b = ["Mango", "Orange"];
            let all = a.concat(b);
            document.write("concat: " + all +"<br>");

            document.write("join: " +all.join(" | ")+ "<br>");

            let arr = ["cat","dog","cat","bird"];
            document.write("indexOf cat: " + arr.indexOf("cat")+ "<br>");
            document.write("lastIndexOf cat: "+ arr.lastIndexOf("cat")+ "<br>");
            document.write("indexOf fish: "+ arr.indexOf("fish")+"<br>");

            document.write("includes dog: " + arr.includes("dog") + "<br>");
            document.write("includes fish: "+ arr.includes("fish")+ "<br>");

        </script>
    </body>
</html>
