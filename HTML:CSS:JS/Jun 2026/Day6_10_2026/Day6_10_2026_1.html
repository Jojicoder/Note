<!DOCTYPE html>
<html>
    <head></head>
    <body>
        <h2>Fruit Basket Manager</h2>
        <input type="text" id="fruitInput" placeholder="Enter a fruit">
        <button onclick="addFruits()">Add Fruit</button>
        <button onclick="showBasket()">Show Basket</button>
        <button onclick="searchFruits()">Search Fruits</button>
        <button onclick="removeFruits()">Remove Fruits</button>
        <button onclick="countFruits()">Count Fruits</button>
        <button onclick="clearBasket()">Clear Basket</button>
        <p id="output"></p>

        <script>
            let fruitBasket = [];

            function addFruits(){
                let fruit = document.getElementById("fruitInput").value;
                if(fruit){
                    if(fruitBasket.includes(fruit)){
                        document.getElementById("output").innerText = fruit + " is already in the basket.";
                    }else{
                        fruitBasket.push(fruit);
                        document.getElementById("output").innerText = fruit + " is added."
                    }
                    document.getElementById("fruitInput").value = "";
                }
            }

            function showBasket(){
                document.getElementById("output").innerText = "Basket: "+ fruitBasket.join(", ");
            }

            function searchFruit(){
                let fruit = document.getElementById("fruitInput").value;
                if(fruitBasket.includes(fruit)){
                    document.getElementById("output").innerText = fruit + " is in the basket.";
                }else{
                    document.getElementById("output").innerText = fruit + " is NOT in the basket.";
                }
                document.getElementById("fruitInput").value = "";
            }

            function removeFruits(){
                let fruitToRemove = document.getElementById("fruitInput").value;
                for(let i = fruitBasket.length - 1 ;i>=0; i--){
                    if(fruitBasket[i] == fruitToRemove){
                        fruitBasket.splice(i,1);
                    }
                }
                document.getElementById("output").innerText = fruitToRemove + " is removed.";
                document.getElementById("fruitInput").value = "";
            }
            function countFruits() {
                document.getElementById("output").innerText = "Count: " + fruitBasket.length;
            }

            function clearBasket() {
                fruitBasket = [];
                document.getElementById("output").innerText = "Basket is cleared.";
            }
        </script>
    </body>
</html>
