<!DOCTYPE html>
<html>
    <head>
    </head>
    <body>
        <script>
            let name = prompt("Enter your name");
            let age = Number(prompt("Enter you age"));
            let major = prompt("Enter your major");
            document.write("name is "+ name + ", age is "+ age+ ", and major is " + major+"<br>");

            let answer = confirm("Do you want to continue to the next page?");
            alert(answer);

            let fahrenheit = Number(prompt("Enter temperature in Fahrenheit"));
            let celsius = (5/9) * (fahrenheit - 32);
            document.write("temperature in Fahrenheit=" + fahrenheit+ " and the value in Celsius= "+ celsius + "<br>");
        </script>
    </body>
</html>
