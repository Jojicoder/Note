<!DOCTYPE html>
<html>
    <head>
        <style>
            body{
                font-family: Arial;
                background-color: #eee;
                padding: 20px;
            }

            .box{
                width: 300px;
                background-color: white;
                margin: 20px 0px;
            }

            .box1{
                border: 3px solid blue;
                border-radius: 10px;
                padding: 20px;
            }
            
            .box2{
                border: 4px dashed orange;
                border-radius: 25px;
                padding: 10px 40px;
            }

            .box3{
                border: 5px double #2ecc71;
                padding: 30px 20px 10px 20px;
            }
        </style>
    </head>
    <body>
        <div class="box box1">
            <h3>Box 1</h3>
            <p>Solid border</p>
        </div>

        <div class="box box2">
            <h3>Box 2</h3>
            <p>Dashed border</p>
        </div>

        <div class="box box3">
            <h3>Box 3</h3>
            <p>Double border</p>
        </div>
    </body>
</html>
