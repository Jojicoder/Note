<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Transition</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="app">
    <h1 class="title">CSS Transition</h1>

    <!-- Button transition -->
    <h2 class="subtitle">Button</h2>
    <button class="btn">Hover me!</button>

    <!-- Card transition -->
    <h2 class="subtitle">Card</h2>
    <div class="cards">
      <div class="card">
        <h3 class="card__title">Card 1</h3>
        <p class="card__text">Hover to see transition.</p>
      </div>
      <div class="card">
        <h3 class="card__title">Card 2</h3>
        <p class="card__text">Hover to see transition.</p>
      </div>
      <div class="card">
        <h3 class="card__title">Card 3</h3>
        <p class="card__text">Hover to see transition.</p>
      </div>
    </div>

    <!-- Color transition -->
    <h2 class="subtitle">Color Box</h2>
    <div class="color-box">Hover me!</div>

  </div>

</body>
</html>
