<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>DOM Manipulation</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="app">
    <h1 class="title" id="title">Hello, World!</h1>
    <p class="desc" id="desc">This is the original text.</p>

    <div class="controls">
      <button class="btn" id="changeTextBtn">Change Text</button>
      <button class="btn" id="changeColorBtn">Change Color</button>
      <button class="btn" id="toggleClassBtn">Toggle Class</button>
      <button class="btn" id="resetBtn">Reset</button>
    </div>

    <div class="cards" id="cards">
      <div class="card">Card 1</div>
      <div class="card">Card 2</div>
      <div class="card">Card 3</div>
    </div>
  </div>

  <script src="main.js"></script>
</body>
</html>
