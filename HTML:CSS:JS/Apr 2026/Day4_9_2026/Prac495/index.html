<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Loop & DOM</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="app">
    <h1 class="title">My Card List</h1>

    <!-- Cards are generated by JS -->
    <div class="cards" id="cards"></div>

    <!-- Table is generated by JS -->
    <h2 class="subtitle">User Table</h2>
    <table class="table" id="table">
      <thead>
        <tr>
          <th>Name</th>
          <th>Age</th>
          <th>Job</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>

  <script src="main.js"></script>
</body>
</html>
