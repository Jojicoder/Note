<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, inital-scale=1.0"/>
        <title>Quiz App</title>
        <link rel="stylesheet" href="style.css"/>
    </head>
    <body>
        <div class = "app">
            <header class="header">
                <h1 class="header__title">Quiz App</h1>
                <p class = "header__progress" id="progress">Question 1 / 3</p>
            </header>

            <main class="main">
                <section class="card">
                    <p class="card__question" id="question">
                        Loading...
                    </p>

                    <div class="card__answers" id="answers">
                        <button class="answer-btn" id="btn0"></button>
                        <button class="answer-btn" id="btn1"></button>
                        <button class="answer-btn" id="btn2"></button>
                        <button class="answer-btn" id="btn3"></button>
                    </div>

                    <p class="card__feedback" id="feedback"></p>

                    <button class="card__next" id="nextBtn">Next -></button>
                </section>
            </main>

            <div class="result" id="result">
                <h2 class="result__title">Quiz Finished!</h2>
                <p  class="result__score" id="score"></p>
                <button class="result__btn" id="retryBtn">Try Again</button>
            </div>
        </div>
        <script src="main.js"></script>
    </body>
</html>
