<!DOCTYPE html>
<html>
    <head>
        <style>
            .a1{text-align: center;}
            .a2{text-align: justify;}
            .a3{text-align-last: right;}

            .d1{text-decoration: underline red solid 2px;}
            .d2{text-decoration: line-through blue wavy;}
            .d3{text-decoration: overline green dotted;}

            .t1{text-transform: uppercase;}
            .t2{text-transform: lowercase;}
            .t3{text-transform: capitalize;}

            .s1{text-indent: 50px;}
            .s2{letter-spacing: 5px;}
            .s3{word-spacing: 10px;}
            .s4{line-height: 1.8;}
        </style>
    </head>
    <body>
          <p class="a1">中央揃え</p>
  <p class="a2">両端揃え</p>
  <p class="a3">最後の行だけ右揃え</p>
  <p class="d1">下線</p>
  <p class="d2">打ち消し線</p>
  <p class="d3">上線</p>
  <p class="t1">uppercase</p>
  <p class="t2">LOWERCASE</p>
  <p class="t3">capitalize this text</p>
  <p class="s1">インデント</p>
  <p class="s2">文字間隔</p>
  <p class="s3">単語 間隔 テスト</p>
  <p class="s4">行間<br>テスト</p>
    </body>
</html>
