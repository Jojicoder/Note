<!DOCTYPE html>
<html><head>
    <style>
        .f1{font-family: "Times New Roman", Times, serif;}
        .f2{font-family: Arial, Helvetica,sans-serif;}
        .f3{font-family: "Courier New", Courier, monospace;}

        .s1{font-size:14px;}
        .s2{font-size:0.075em;}
        .s3{font-size: 150%;}

        .w1{font-weight: normal;}
        .w2{font-weight: bold;}
        .w3{font-weight: lighter;}

        .v1{font-variant: normal;}
        .v2{font-variant: small-caps;}

        .short{font: italic small-caps bold 14px/1.5 Arial, sans-serif;}
    </style>
    </head>
    <body>
          <p class="f1">Serif フォント</p>
  <p class="f2">Sans-serif フォント</p>
  <p class="f3">Monospace フォント</p>
  <p class="s1">14px</p>
  <p class="s2">0.875em</p>
  <p class="s3">150%</p>
  <p class="st1">normal</p>
  <p class="st2">italic</p>
  <p class="st3">oblique</p>
  <p class="w1">normal</p>
  <p class="w2">bold</p>
  <p class="w3">lighter</p>
  <p class="v1">normal</p>
  <p class="v2">small-caps</p>
  <p class="short">shorthand</p>
    </body>
</html>
