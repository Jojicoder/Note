<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <style>
            p{color:red;}

            .myClass{color:blue;}

            #myID{color: green;}

            *{box-sizing: border-box;}

            p a{text-decoration: none;}
        </style>
    </head>
    <body>
        <p>赤いテキスト</p>
        <p class="myClass">青いテキスト</p>
        <p id="myID">緑のテキスト</p>
        <p><a href="#">リンク</a></p>
    </body>
</html>
