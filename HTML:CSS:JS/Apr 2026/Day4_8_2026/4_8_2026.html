<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <title>CSS Grid</title>
    <link rel="stylesheet" href="style.css"/>
</head>

<body>
    <h1 class ="title">CSS Grid Basics</h1>
    <h2 class="subtitle">3 Columns</h2>
    <div class="grid-3">
        <div class="item">1</div>
        <div class="item">2</div>
        <div class="item">3</div>
        <div class="item">4</div>
        <div class="item">5</div>
        <div class="item">6</div>
    </div>

    <h2 class="subtitle">Different Widths</h2>
    <div class="grid-mixed">
        <div class="item">Wide</div>
        <div class="item">Narrow</div>
        <div class="item">Narrow</div>
    </div>

    <h2 class="subtitle">With Gap</h2>
    <div class="grid-gap">
        <div class="item">1</div>
        <div class="item">2</div>
        <div class="item">3</div>
        <div class="item">4</div>
    </div>
</body>

</html>
