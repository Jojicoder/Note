<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UFT-8"/>
        <title>Grid Span</title>
        <link rel="stylesheet" href="style.css"/>
    </head>

    <body>
        <h1 class="title">Grid Column & Row Span</h1>

        <h2 class="subtitle">grid-column span</h2>
        <div class="grid-col">
            <div class="item item--wide">Wide (1/3)</div>
            <div class="item">2</div>
            <div class="item">3</div>
            <div class="item">4</div>
            <div class="item">5</div>
        </div>

        <h2 class="subtilte">grid-row span</h2>
        <div class="grid-row">
            <div class="item item--tall">Tall (1/3)</div>
            <div class="item">2</div>
            <div class="item">3</div>
            <div class="item">4</div>
            <div class="item">5</div>
        </div>

        <h2 class="subtitle">Combined Layout</h2>
        <div class = "grid-combined">
            <div class="item item--header">Header</div>
            <div class="item item--sidebar">Sidebar</div>
            <div class="item item--main">Main</div>
            <div class="item item--footer">Footer</div>
        </div>
    </body>
</html>
