<!Doctype html>
<html>
    <head>
        <style>
            .color1{ color:red;}
            .color2{ color:rgb(0,128,255);}
            .color3{ color: #2ecc71;}

            .left  { text-align: left;}
            .center{ text-align: center;}
            .right { text-align: right;}
            .justify{ text-align: justify;}

            .underline{ text-decoration: underline;}
            .line {text-decoration: line-through;}

            .font1{ font-family: serif;}
            .font2{ font-family: sans-serif;}
            .font3{ font-family: monospace;}

            body{
                background-color: lightblue;
                background-image: url("https://picsum.photos/800");
                background-repeat: no-repeat;
                background-attachment: scroll;
                background-position: center;
            }
        </style>
    </head>

    <body>
        <p class="color1">Red text</p>
        <p class="color2">RGB text</p>
        <p class="color3">HEX text</p>

        <p class="center underline">Centered + Underline</p>
        <p class="right line">Right + Line-through</p>

        <p class="font1">Serif font</p>
        <p class="font2">Sans-serif font</p>
        <p class="font3">Monospace</p>
    </body>
</html>
