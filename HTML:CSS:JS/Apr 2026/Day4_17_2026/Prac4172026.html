<!DOCTYPE html>
<html lang = "en">
    <head>
        <meta charset = "UTF-8">
        <title>Lab 4</title>
        <style>
            body{
                font-family: Arial;
                background-color: lightgray;
                padding:20;
            }

            .box{
                width: 300px;
                padding: 15px 25px;
                margin: 20px 0 10px;
                background-color: white;
            }

            .box1{
                border-style: solid;
                border-width: 3px;
                border-color: blue;
                border-radius: 10px;
                margin: 20px 50px 10px 30px;
                padding: 20px;
            }

            .box2{
                border-style: dashed;
                border-width: 4px;
                border-color: orange;
                border-radius: 25px;
                margin: 40px 0 20px 0;
                padding: 10px 40px;
            }

            .box3{
                border-style:double;
                border-width:5px;
                border-color: #2ecc71;
                margin: 10px;
                padding: 30px 20px 10px 20px;
            }
        </style>
    </head>
    <body>
        <div class="box box1">Box 1</div>
        <div class="box box2">Box 2</div>
        <div class="box box3">Box 3</div>
    </body>
</html>
