<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8"/>
    </head>

    <body>
        <h1 id="title">Hello</h1>
        <button onclick="changeColor()">Change Color!</button>

        <script>
            function changeColor(){
                document.getElementById("title").style.color="red";
            }
        </script>
    </body>
</html>
