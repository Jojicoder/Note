<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8"/>
        <title>Control Structures Practice</title>
    </head>
    <body>
        <script>
            let hour=15;
            if(hour < 10){
                document.write("Good morning" +" <br>");
            }else if(hour < 10){
                document.write("Good day" + "<br>");
            }else{
                document.write("Good evening"+"<br>");
            }

            let age = 20;
            let access = (age>18) ? "Allowed" :"Denied";
            document.write(access+ "<br>");

            for(let i = 1;i<=5;i++){
                document.write("Line: " + i + "<br>");
            }
        </script>
    </body>
</html>
